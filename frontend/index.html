<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SciRes — Đăng nhập</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-box h2 { color: #1e293b; }
    .login-box .subtitle { color: #64748b; font-size: 13px; margin-bottom: 20px; text-align: center; }
    .demo-accounts { margin-top: 16px; background: #f8fafc; border-radius: 6px; padding: 12px; }
    .demo-accounts h4 { font-size: 12px; color: #64748b; margin-bottom: 8px; }
    .demo-accounts button { display: block; width: 100%; margin-bottom: 4px; padding: 6px; background: #e2e8f0; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; text-align: left; }
    .demo-accounts button:hover { background: #cbd5e1; }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-box">
      <h2>🔬 SciRes</h2>
      <p class="subtitle">Hệ thống Quản lý Nghiên cứu Khoa học</p>
      <div id="login-msg"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="email@university.edu.vn" required>
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="password" placeholder="password123" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:4px">Đăng nhập</button>
      </form>

      <div class="demo-accounts">
        <h4>🧪 Tài khoản demo (pass: password123)</h4>
        <button onclick="fillLogin('admin@university.edu.vn')">Admin — admin@university.edu.vn</button>
        <button onclick="fillLogin('staff@university.edu.vn')">Staff (P.KHCN) — staff@university.edu.vn</button>
        <button onclick="fillLogin('leader@university.edu.vn')">Lãnh đạo — leader@university.edu.vn</button>
        <button onclick="fillLogin('faculty1@university.edu.vn')">Giảng viên — faculty1@university.edu.vn</button>
        <button onclick="fillLogin('faculty2@university.edu.vn')">Giảng viên — faculty2@university.edu.vn</button>
        <button onclick="fillLogin('reviewer1@university.edu.vn')">Phản biện — reviewer1@university.edu.vn</button>
        <button onclick="fillLogin('reviewer2@university.edu.vn')">Phản biện — reviewer2@university.edu.vn</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (API.token()) location.href = '/app.html';

    function fillLogin(email) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = 'password123';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('login-msg');
      try {
        msg.innerHTML = '';
        const user = await API.login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        location.href = '/app.html';
      } catch(err) {
        msg.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
